<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="EduTrack AI login portal - secure access to student performance visual dashboards.">
  <title>Login - EduTrack AI</title>
  
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/3d.css">

  <style>
    .login-wrapper {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      position: relative;
    }

    .login-card {
      width: 100%;
      max-width: 440px;
      padding: 48px 40px;
      background: rgba(26, 26, 46, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    }

    .login-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-logo {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ffffff, var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .login-subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .password-container {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: var(--transition);
    }

    .password-toggle:hover {
      color: var(--text-primary);
    }

    .error-box {
      background: rgba(255, 77, 109, 0.1);
      border-left: 4px solid var(--danger);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text-primary);
      font-size: 0.9rem;
      margin-bottom: 24px;
      display: none;
    }

    /* Loading Spinner */
    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn-login-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
  </style>
</head>
<body>

  <!-- Background canvas -->
  <canvas id="bg"></canvas>

  <div class="login-wrapper">
    <div class="glass-card login-card card-3d card-3d-purple" id="login-container-card">
      <div class="card-3d-pop">
        <div class="login-header">
          <h2 class="login-logo">EduTrack AI</h2>
          <p class="login-subtitle">Intelligent Performance Analytics Login</p>
        </div>

        <div class="error-box" id="login-error">Invalid email or password</div>

        <form id="login-form">
          <div class="form-group">
            <label for="email-input">Email Address</label>
            <input type="email" id="email-input" class="form-control" placeholder="admin@edutrack.com" required autocomplete="email">
          </div>

          <div class="form-group">
            <label for="password-input">Password</label>
            <div class="password-container">
              <input type="password" id="password-input" class="form-control" placeholder="••••••••" required autocomplete="current-password">
              <button type="button" class="password-toggle" id="password-toggle-btn">SHOW</button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 12px;" id="login-submit-btn">
            <span class="btn-login-content">
              <span id="btn-text">SIGN IN</span>
              <span class="spinner" id="btn-spinner"></span>
            </span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- CDN Three.js Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- Background Generator Script -->
  <script src="js/three-bg.js"></script>

  <!-- Network client & Auth helper -->
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // If already logged in, redirect immediately to dashboard
      if (isLoggedIn()) {
        window.location.href = 'dashboard.html';
      }

      const form = document.getElementById('login-form');
      const emailInput = document.getElementById('email-input');
      const passwordInput = document.getElementById('password-input');
      const toggleBtn = document.getElementById('password-toggle-btn');
      const errorBox = document.getElementById('login-error');
      const submitBtn = document.getElementById('login-submit-btn');
      const btnText = document.getElementById('btn-text');
      const btnSpinner = document.getElementById('btn-spinner');

      // 1. Password Visibility Toggle
      toggleBtn.addEventListener('click', () => {
        if (passwordInput.type === 'password') {
          passwordInput.type = 'text';
          toggleBtn.textContent = 'HIDE';
        } else {
          passwordInput.type = 'password';
          toggleBtn.textContent = 'SHOW';
        }
      });

      // 2. Form Submission Action
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Reset state
        errorBox.style.display = 'none';
        btnText.textContent = 'VERIFYING...';
        btnSpinner.style.display = 'block';
        submitBtn.disabled = true;

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        try {
          // Perform login request using auth.js login helper
          const success = await loginUser(email, password);
          if (!success) {
            throw new Error();
          }
        } catch (err) {
          // Render error layout
          errorBox.style.display = 'block';
          errorBox.textContent = err.message || 'Invalid email or password';
          
          // Re-enable form controls
          btnText.textContent = 'SIGN IN';
          btnSpinner.style.display = 'none';
          submitBtn.disabled = false;
        }
      });
    });
  </script>

</body>
</html>
